<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔗 ShortLink – URL Shortener</title>

  <!-- Google Font (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* --- Reset & Base --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #0f172a;
      padding: 1.5rem;
    }

    /* --- Card --- */
    .card {
      max-width: 640px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
      border: 1px solid #e9edf4;
      text-align: center;
    }

    /* --- Logo --- */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }
    .logo span {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1.1rem;
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* --- Features --- */
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .feature-item {
      background: #f1f5f9;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .feature-item .icon {
      font-size: 1.2rem;
      line-height: 1;
    }

    /* --- Form --- */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    input[type="url"] {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border: 2px solid #e2e8f0;
      border-radius: 1.5rem;
      font-size: 1rem;
      font-family: inherit;
      background: #f8fafc;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      min-width: 200px;
    }
    input[type="url"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }
    input[type="url"]::placeholder {
      color: #94a3b8;
    }

    .btn-primary {
      padding: 0.9rem 2rem;
      background: #0f172a;
      color: #ffffff;
      border: none;
      border-radius: 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .btn-primary:hover {
      background: #1e293b;
    }
    .btn-primary:active {
      transform: scale(0.96);
    }
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* --- Result --- */
    .result-box {
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      background: #f1f5f9;
      border-radius: 1.5rem;
      border: 2px solid #e2e8f0;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 3.5rem;
    }
    .result-box .url-display {
      font-size: 0.95rem;
      color: #0f172a;
      flex: 1;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-box .url-display a {
      color: #3b82f6;
      text-decoration: none;
    }
    .result-box .url-display a:hover {
      text-decoration: underline;
    }

    .copy-btn {
      background: #e2e8f0;
      border: none;
      border-radius: 1rem;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #0f172a;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .copy-btn:hover {
      background: #cbd5e1;
    }
    .copy-btn.copied {
      background: #22c55e;
      color: white;
    }

    .error-message {
      color: #ef4444;
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 0.25rem;
      min-height: 1.5rem;
    }

    /* --- Footer --- */
    .footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e9edf4;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .footer a {
      color: #3b82f6;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    /* --- Spinner --- */
    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 0.3rem;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* --- Responsive --- */
    @media (max-width: 500px) {
      .card {
        padding: 1.75rem 1rem;
      }
      .logo {
        font-size: 1.6rem;
      }
      .input-row {
        flex-direction: column;
      }
      .btn-primary {
        width: 100%;
        justify-content: center;
      }
      .result-box {
        flex-wrap: wrap;
        justify-content: center;
      }
      .result-box .url-display {
        white-space: normal;
        text-align: center;
        width: 100%;
      }
      .features {
        gap: 0.4rem;
      }
      .feature-item {
        font-size: 0.75rem;
        padding: 0.3rem 0.7rem;
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo">🔗 <span>ShortLink</span></div>
    <p class="tagline">
      Paste a long URL &amp; get a short, shareable link instantly.
    </p>

    <!-- Feature badges -->
    <div class="features">
      <span class="feature-item"><span class="icon">⚡</span> Instant</span>
      <span class="feature-item"><span class="icon">🔒</span> Private</span>
      <span class="feature-item"><span class="icon">📦</span> Self‑hosted</span>
      <span class="feature-item"><span class="icon">🌐</span> No tracking</span>
    </div>

    <!-- Form -->
    <form id="shortenForm" novalidate>
      <div class="form-group">
        <div class="input-row">
          <input
            type="url"
            id="urlInput"
            placeholder="Paste your long URL here…"
            required
            autofocus
            value=""
          />
          <button type="submit" class="btn-primary" id="shortenBtn">
            <span id="btnText">Shorten</span>
          </button>
        </div>
        <div id="errorMessage" class="error-message"></div>
      </div>
    </form>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      <span class="url-display" id="resultUrl"></span>
      <button class="copy-btn" id="copyBtn">📋 Copy</button>
    </div>

    <!-- Footer -->
    <div class="footer">
      Built with ❤️ using Node.js, Express &amp; SQLite &middot;
      <a href="https://github.com/yared2124/CodeAlpha_Simple_URL_Shortener" target="_blank">GitHub</a>
    </div>

  </div>

  <script>
    (function() {
      // ----- DOM refs -----
      const form = document.getElementById('shortenForm');
      const urlInput = document.getElementById('urlInput');
      const shortenBtn = document.getElementById('shortenBtn');
      const btnText = document.getElementById('btnText');
      const errorDiv = document.getElementById('errorMessage');
      const resultBox = document.getElementById('resultBox');
      const resultUrl = document.getElementById('resultUrl');
      const copyBtn = document.getElementById('copyBtn');

      // ----- UI helpers -----
      function setLoading(loading) {
        if (loading) {
          btnText.innerHTML = '<span class="spinner"></span> Shortening…';
          shortenBtn.disabled = true;
        } else {
          btnText.textContent = 'Shorten';
          shortenBtn.disabled = false;
        }
      }

      function setError(msg) {
        errorDiv.textContent = msg || '';
      }

      function showResult(shortUrl) {
        resultUrl.innerHTML = `<a href="${shortUrl}" target="_blank">${shortUrl}</a>`;
        resultBox.style.display = 'flex';
        resultBox.dataset.url = shortUrl;
      }

      // ----- Copy to clipboard -----
      copyBtn.addEventListener('click', async function() {
        const url = resultBox.dataset.url;
        if (!url) return;
        try {
          await navigator.clipboard.writeText(url);
          copyBtn.textContent = '✅ Copied!';
          copyBtn.classList.add('copied');
          setTimeout(() => {
            copyBtn.textContent = '📋 Copy';
            copyBtn.classList.remove('copied');
          }, 2000);
        } catch (_) {
          // fallback
          const range = document.createRange();
          range.selectNode(resultUrl);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
          document.execCommand('copy');
          window.getSelection().removeAllRanges();
          copyBtn.textContent = '✅ Copied!';
          setTimeout(() => {
            copyBtn.textContent = '📋 Copy';
          }, 2000);
        }
      });

      // ----- Form submit -----
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const longUrl = urlInput.value.trim();

        if (!longUrl) {
          setError('Please enter a URL.');
          return;
        }
        try {
          new URL(longUrl);
        } catch (_) {
          setError('Invalid URL. Include http:// or https://');
          return;
        }

        setError('');
        resultBox.style.display = 'none';
        setLoading(true);

        try {
          // ✅ Use the correct API endpoint (matches your server)
          const response = await fetch('/api/shorten', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ longUrl })
          });

          const rawText = await response.text();
          console.log('📦 Server raw response:', rawText);

          if (!rawText) {
            throw new Error('Empty response from server.');
          }
          const data = JSON.parse(rawText);
          if (!response.ok) {
            throw new Error(data.error || 'Server error');
          }

          showResult(data.shortUrl);
        } catch (err) {
          console.error('❌', err);
          setError(err.message || 'Something went wrong.');
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>

</body>
</html>
