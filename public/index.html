<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔗 ShortLink – URL Shortener</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet"
  />

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
      ☀️
    </button>

    <!-- Logo -->
    <div class="logo"> <span>URL Shortener </span></div>
    <p class="tagline">
      Paste a long URL &amp; get a short, shareable link instantly.
    </p>

    <!-- Feature badges -->
    <div class="features">
      <span class="feature-item"><span class="icon">⚡</span> Instant</span>
      <span class="feature-item"><span class="icon">🔒</span> Private</span>
      <span class="feature-item"><span class="icon">📦</span> Self‑hosted</span>
      <span class="feature-item"><span class="icon">🌐</span> No tracking</span>
    </div>

    <!-- Form -->
    <form id="shortenForm" novalidate>
      <div class="form-group">
        <div class="input-row">
          <input
            type="url"
            id="urlInput"
            placeholder="Paste your long URL here…"
            required
            autofocus
          />
          <button type="submit" class="btn-primary" id="shortenBtn">
            <span id="btnText">Shorten</span>
          </button>
        </div>
        <!-- Character counter -->
        <div id="charCount" class="char-counter"></div>
        <div id="errorMessage" class="error-message"></div>
      </div>
    </form>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      <span class="url-display" id="resultUrl"></span>
      <button class="copy-btn" id="copyBtn">📋 Copy</button>
    </div>

    <!-- Footer -->
    <div class="footer">
     
      <a href="https://github.com/yared2124/CodeAlpha_Simple_URL_Shortener" target="_blank">GitHub</a>
    </div>

  </div>

  <!-- External JavaScript -->
  <script src="script.js"></script>
</body>
</html>
