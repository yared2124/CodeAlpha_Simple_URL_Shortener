<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔗 Simple URL Shortener</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet"
  />

  <!-- External CSS -->
  <link rel="stylesheet" href="/Simple-URL-Shortener/public/index.css" />
</head>
<body>

  <div class="container">
    <div class="card">

      <!-- Dark Mode Toggle (top-right corner) -->
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
        🌙
      </button>

      <!-- Logo & Heading -->
      <div class="logo">
        🔗 <span>ShortLink</span>
      </div>
      <p class="tagline">
        A minimalist, self-hosted URL shortener.<br />
        Paste a long link, get a neat, shareable short URL instantly.
      </p>

      <!-- Feature badges -->
      <div class="features">
        <span class="feature-item"><span class="icon">⚡</span> Instant</span>
        <span class="feature-item"><span class="icon">🔒</span> Privacy-aware</span>
        <span class="feature-item"><span class="icon">📦</span> Self-hosted</span>
        <span class="feature-item"><span class="icon">🌐</span> No tracking</span>
      </div>

      <!-- Form -->
      <form id="shortenForm" class="form-group" novalidate>
        <div class="input-row">
          <input
            type="url"
            id="urlInput"
            placeholder="Paste your long URL here…"
            required
            autofocus
            value="https://example.com/very/long/path?utm=test&ref=123"
          />
          <button type="submit" id="shortenBtn">
            <span id="btnText">Shorten</span>
          </button>
        </div>
        <div id="errorMessage" class="error-message"></div>
      </form>

      <!-- Result Display -->
      <div id="resultBox" class="result-box" style="display: none">
        <span class="url-display" id="resultUrl"></span>
        <button class="copy-btn" id="copyBtn">📋 Copy</button>
      </div>

    </div>

    <div class="footer">
       
      <a href="https://github.com/yared2124/CodeAlpha_Simple_URL_Shortener" target="_blank">GitHub</a>
    </div>
  </div>

  <script>
    (function () {
      // --- DOM refs ---
      const form = document.getElementById('shortenForm');
      const urlInput = document.getElementById('urlInput');
      const shortenBtn = document.getElementById('shortenBtn');
      const btnText = document.getElementById('btnText');
      const errorDiv = document.getElementById('errorMessage');
      const resultBox = document.getElementById('resultBox');
      const resultUrl = document.getElementById('resultUrl');
      const copyBtn = document.getElementById('copyBtn');
      const themeToggle = document.getElementById('themeToggle');

      // --- THEME TOGGLE LOGIC ---
      function getPreferredTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || saved === 'light') return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function applyTheme(theme) {
        if (theme === 'dark') {
          document.body.classList.add('dark-mode');
          themeToggle.textContent = '☀️';
        } else {
          document.body.classList.remove('dark-mode');
          themeToggle.textContent = '🌙';
        }
        localStorage.setItem('theme', theme);
      }

      function toggleTheme() {
        const current = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next);
      }

      // Init theme
      applyTheme(getPreferredTheme());
      themeToggle.addEventListener('click', toggleTheme);

      // Listen for system changes only if user hasn't manually saved a preference
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) {
          applyTheme(e.matches ? 'dark' : 'light');
        }
      });

      // --- URL SHORTENER LOGIC ---
      function setLoading(isLoading) {
        if (isLoading) {
          btnText.innerHTML = '<span class="spinner"></span> Shortening…';
          shortenBtn.disabled = true;
        } else {
          btnText.textContent = 'Shorten';
          shortenBtn.disabled = false;
        }
      }

      function setError(msg) {
        if (msg) {
          errorDiv.textContent = msg;
          errorDiv.style.display = 'block';
        } else {
          errorDiv.textContent = '';
          errorDiv.style.display = 'none';
        }
      }

      function showResult(shortUrl) {
        resultUrl.innerHTML = `<a href="${shortUrl}" target="_blank">${shortUrl}</a>`;
        resultBox.style.display = 'flex';
        resultBox.dataset.url = shortUrl;
      }

      // Copy to clipboard
      copyBtn.addEventListener('click', async function () {
        const url = resultBox.dataset.url;
        if (!url) return;
        try {
          await navigator.clipboard.writeText(url);
          copyBtn.textContent = '✅ Copied!';
          copyBtn.classList.add('copied');
          setTimeout(() => {
            copyBtn.textContent = '📋 Copy';
            copyBtn.classList.remove('copied');
          }, 2000);
        } catch (_) {
          const range = document.createRange();
          range.selectNode(resultUrl);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
          document.execCommand('copy');
          window.getSelection().removeAllRanges();
          copyBtn.textContent = '✅ Copied!';
          setTimeout(() => {
            copyBtn.textContent = '📋 Copy';
          }, 2000);
        }
      });

      // Form submit
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const longUrl = urlInput.value.trim();
        if (!longUrl) {
          setError('Please enter a URL.');
          return;
        }
        try {
          new URL(longUrl);
        } catch (_) {
          setError('Invalid URL. Please include "http://" or "https://".');
          return;
        }

        setError(null);
        resultBox.style.display = 'none';
        setLoading(true);

        try {
          const response = await fetch('/api/shorten', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ longUrl }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || 'Server error');
          }
          showResult(data.shortUrl);
        } catch (err) {
          setError(err.message || 'Something went wrong. Please try again.');
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>

</body>
</html>
